{% extends 'base.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h2 class="text-center mb-4">Оставить отзыв</h2>
                    <p class="text-muted">
                        Курс: {{ application.course.name }}<br>
                        Заявка #{{ application.id }}
                    </p>
                    <form method="post" novalidate>
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="{{ form.text.id_for_label }}" class="form-label">
                                Ваш отзыв
                            </label>
                            {{ form.text }}
                        </div>
                        <button type="submit" class="btn btn-primary w-100 btn-submit">
                            <span class="spinner-border spinner-border-sm d-none me-2" role="status"></span>
                            Отправить отзыв
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
